<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
        <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
        <script src="https://raw.githack.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>
        
        <style>
            #ui-container {
                position: absolute;
                top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0, 0, 0, 0.8);
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                z-index: 9999;
                color: white;
                font-family: sans-serif;
            }
            #start-btn {
                background: #ffffff;
                color: #000000;
                border: none;
                padding: 15px 40px;
                font-size: 20px;
                font-weight: bold;
                border-radius: 30px;
                cursor: pointer;
                margin-top: 20px;
                box-shadow: 0 4px 10px rgba(255,255,255,0.3);
            }
        </style>
    </head>

    <body style="margin: 0; overflow: hidden;">
        
        <div id="ui-container">
            <h2>準備好體驗 AR 了嗎？</h2>
            <p>請允許使用「相機」權限</p>
            <button id="start-btn">進入 AR 體驗</button>
        </div>

        <a-scene
            renderer="logarithmicDepthBuffer: true;"
            embedded
            loading-screen="enabled: false;"
            arjs="sourceType: webcam; debugUIEnabled: false;"
        >
            <a-assets>
                <a-asset-item id="animated-asset" src="assets/asset.glb"></a-asset-item>
                <audio id="bg-music" src="Sandungueo_sin_freno.mp3" preload="auto" loop="true"></audio>
            </a-assets>

            <a-entity
                id="ar-wrapper"
                position="0 0 -5"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear;"
            >
                <a-entity
                    gltf-model="#animated-asset"
                    animation-mixer="loop: repeat"
                    scale="0.1 0.1 0.1"
                    position="5 0 0"
                    rotation="15 -90 0"
                ></a-entity>
            </a-entity>

            <a-camera look-controls></a-camera>
        </a-scene>

        <script>
            document.getElementById('start-btn').addEventListener('click', () => {
                // 1. 隱藏 UI 介面
                document.getElementById('ui-container').style.display = 'none';

                // 2. 瞬間播放音樂！(因為不需要等待 GPS 定位了)
                const bgMusic = document.getElementById('bg-music');
                bgMusic.play().catch(err => {
                    console.error("音樂播放失敗:", err);
                });
                
                console.log("AR 啟動成功！模型已固定於相機前方。");
            });
        </script>
    </body>
</html>
