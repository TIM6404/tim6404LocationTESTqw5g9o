<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Ultimate AR Location</title>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

    <style>
        :root { --cyan: #00ffe7; --dark: #020c14; }
        body { margin: 0; overflow: hidden; background: var(--dark); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        #overlay {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(2, 12, 20, 0.95); color: white; text-align: center;
            backdrop-filter: blur(5px);
        }
        #overlay h2 { margin-bottom: 10px; color: var(--cyan); }
        #overlay p { margin-bottom: 30px; font-size: 0.9rem; opacity: 0.8; }
        #start-btn {
            padding: 15px 35px; font-size: 1.2rem; background: rgba(0, 255, 231, 0.1);
            border: 2px solid var(--cyan); color: var(--cyan); border-radius: 50px;
            cursor: pointer; letter-spacing: 2px; transition: all 0.3s;
        }
        #start-btn:active { background: var(--cyan); color: var(--dark); }

        #status-hud {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            background: rgba(0, 0, 0, 0.75); color: var(--cyan); 
            padding: 12px; font-size: 12px; border-radius: 8px; 
            border-left: 3px solid var(--cyan); pointer-events: none;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <div id="status-hud">
        Status: Waiting for confirmation...<br>
        Latitude: ---<br>
        Longitude: ---
    </div>

    <div id="overlay">
        <h2>Location Permission</h2>
        <p>Please allow location access to place virtual objects in the real world.<br>Exclusive audio and 3D animations will play upon entry.</p>
        <button id="start-btn">Confirm & Start AR</button>
    </div>

    <a-scene
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">
        
        <a-assets>
            <a-asset-item id="model" src="assets/asset.glb"></a-asset-item>
        </a-assets>

        <a-entity id="ar-model-container"></a-entity>

        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <audio id="bgm" src="assets/Sandungueo_sin_freno.mp3" loop preload="auto"></audio>

    <script>
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const hud = document.getElementById('status-hud');
        const bgm = document.getElementById('bgm');
        const container = document.getElementById('ar-model-container');

        startBtn.addEventListener('click', async () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState !== 'granted') {
                        alert('Sensor permission is required to experience AR features.');
                        return;
                    }
                } catch (e) {
                    console.warn("Sensor permission request failed or not supported:", e);
                }
            }

            bgm.play().catch(e => console.log("Audio playback blocked by browser", e));

            overlay.style.display = 'none';
            hud.innerHTML = "Status: Searching for GPS signal...<br>Latitude: Loading...<br>Longitude: Loading...";

            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const latitude = position.coords.latitude;
                        const longitude = position.coords.longitude;
                        const accuracy = position.coords.accuracy;

                        hud.innerHTML = `Status: GPS Locked (Accuracy: ${Math.round(accuracy)}m)<br>Latitude: ${latitude.toFixed(6)}<br>Longitude: ${longitude.toFixed(6)}`;

                        const offsetLat = latitude + 0.000045; 
                        
                        const modelEntity = document.createElement('a-entity');
                        modelEntity.setAttribute('gltf-model', '#model');
                        modelEntity.setAttribute('gps-entity-place', `latitude: ${offsetLat}; longitude: ${longitude};`);
                        modelEntity.setAttribute('scale', '2 2 2');
                        modelEntity.setAttribute('animation-mixer', 'loop: repeat');

                        container.appendChild(modelEntity);
                    },
                    (err) => {
                        hud.innerHTML = `Status: Location Failed<br>Error: ${err.message}`;
                        console.error("GPS Location Error:", err);
                    },
                    { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
                );
            } else {
                hud.innerHTML = "Status: Device does not support GPS";
            }
        });
    </script>
</body>
</html>
