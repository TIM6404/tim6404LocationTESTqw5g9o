<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>AR Location</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@200;400;700;900&display=swap');

      :root {
        --cyan:   #00ffe7;
        --cyan2:  #00bcd4;
        --dark:   #020c14;
        --panel:  rgba(0,20,32,0.82);
        --border: rgba(0,255,231,0.18);
        --red:    #ff4b4b;
        --green:  #39ffa0;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        overflow: hidden;
        background: var(--dark);
        font-family: 'Exo 2', sans-serif;
        color: #c8f0f8;
      }

      /* ════════ SPLASH ════════ */
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        background: var(--dark);
        overflow: hidden;
      }
      #splash::before {
        content: '';
        position: absolute; inset: 0;
        background-image:
          linear-gradient(rgba(0,255,231,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0,255,231,0.04) 1px, transparent 1px);
        background-size: 40px 40px;
        animation: gridMove 8s linear infinite;
      }
      @keyframes gridMove { from{background-position:0 0} to{background-position:40px 40px} }
      #splash::after {
        content: '';
        position: absolute; left: 0; right: 0; height: 2px;
        background: linear-gradient(90deg, transparent, var(--cyan), transparent);
        animation: scanline 3s ease-in-out infinite;
        opacity: 0.5;
      }
      @keyframes scanline { 0%{top:0%;opacity:0} 10%{opacity:.5} 90%{opacity:.5} 100%{top:100%;opacity:0} }

      .splash-inner {
        position: relative; z-index: 1;
        display: flex; flex-direction: column;
        align-items: center; gap: 18px;
        padding: 36px 28px;
        width: min(400px, 92vw);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 20px;
        backdrop-filter: blur(12px);
        box-shadow: 0 0 60px rgba(0,255,231,0.07), inset 0 0 40px rgba(0,255,231,0.02);
        animation: fadeUp 0.7s ease both;
      }
      @keyframes fadeUp { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:none} }

      /* 雷達 */
      .radar {
        position: relative; width: 96px; height: 96px;
      }
      .radar-ring {
        position: absolute; inset: 0; border-radius: 50%;
        border: 1.5px solid transparent;
      }
      .radar-ring:nth-child(1) { border-color: var(--cyan); box-shadow: 0 0 8px var(--cyan); animation: rPulse 2s ease-in-out infinite; }
      .radar-ring:nth-child(2) { inset: 16px; border-color: var(--cyan2); animation: rPulse 2s ease-in-out 0.4s infinite; }
      .radar-ring:nth-child(3) { inset: 32px; border-color: rgba(0,255,231,0.4); animation: rPulse 2s ease-in-out 0.8s infinite; }
      .radar-sweep {
        position: absolute; inset: 0; border-radius: 50%;
        background: conic-gradient(from 0deg, transparent 70%, rgba(0,255,231,0.3) 100%);
        animation: sweep 2s linear infinite;
      }
      .radar-dot {
        position: absolute; inset: 42px; border-radius: 50%;
        background: var(--cyan); box-shadow: 0 0 10px var(--cyan);
        animation: rPulse 1.5s ease-in-out infinite;
      }
      @keyframes sweep  { to{transform:rotate(360deg)} }
      @keyframes rPulse { 0%,100%{opacity:.3;transform:scale(.9)} 50%{opacity:1;transform:scale(1.06)} }

      .splash-title {
        font-family: 'Share Tech Mono', monospace;
        font-size: clamp(26px, 6vw, 36px);
        letter-spacing: 0.2em;
        color: var(--cyan);
        text-shadow: 0 0 18px rgba(0,255,231,0.45);
        text-align: center; line-height: 1;
      }
      .splash-sub {
        font-size: 13px; font-weight: 200;
        color: #6aacbc; letter-spacing: 0.06em;
        line-height: 1.7; text-align: center; max-width: 260px;
      }

      .perm-list { display: flex; flex-direction: column; gap: 8px; width: 100%; }
      .perm-item {
        display: flex; align-items: center; gap: 12px;
        padding: 9px 14px;
        background: rgba(0,255,231,0.03);
        border: 1px solid var(--border); border-radius: 10px;
        font-size: 12px; color: #9dd8e8; letter-spacing: 0.05em;
      }
      .perm-icon { font-size: 17px; }
      .perm-status {
        margin-left: auto;
        font-family: 'Share Tech Mono', monospace;
        font-size: 10px; color: var(--cyan2); letter-spacing: 0.1em;
      }

      #start-btn {
        position: relative; width: 100%; padding: 15px;
        background: transparent; border: 1.5px solid var(--cyan); border-radius: 12px;
        color: var(--cyan);
        font-family: 'Share Tech Mono', monospace; font-size: 15px; letter-spacing: 0.22em;
        cursor: pointer; overflow: hidden;
        transition: color 0.3s, box-shadow 0.3s;
      }
      #start-btn::before {
        content: ''; position: absolute; inset: 0;
        background: var(--cyan);
        transform: scaleY(0); transform-origin: bottom;
        transition: transform 0.3s cubic-bezier(.4,0,.2,1);
      }
      #start-btn:active::before { transform: scaleY(1); }
      #start-btn:active { color: #000; box-shadow: 0 0 28px rgba(0,255,231,0.55); }
      #start-btn span { position: relative; z-index: 1; }

      .ver { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: #1e4050; letter-spacing: 0.1em; }

      /* ════════ LOADING ════════ */
      #loading-screen {
        position: fixed; inset: 0; z-index: 9998;
        display: none; flex-direction: column;
        justify-content: center; align-items: center; gap: 28px;
        background: var(--dark);
      }
      #loading-screen.active { display: flex; }

      .load-ring {
        width: 68px; height: 68px; border-radius: 50%;
        border: 2px solid rgba(0,255,231,0.1);
        border-top-color: var(--cyan); border-right-color: var(--cyan);
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to{transform:rotate(360deg)} }

      .load-steps { display: flex; flex-direction: column; gap: 12px; width: 230px; }
      .load-step {
        display: flex; align-items: center; gap: 10px;
        font-family: 'Share Tech Mono', monospace;
        font-size: 12px; color: #1e4050; letter-spacing: 0.09em;
        transition: color 0.35s;
      }
      .load-step.active { color: var(--cyan); }
      .load-step.done   { color: var(--green); }
      .step-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

      /* ════════ HUD ════════ */
      #hud { position: fixed; top: 0; left: 0; right: 0; z-index: 8888; display: none; flex-direction: column; }
      #hud.active { display: flex; }

      #status-bar {
        background: rgba(0,8,16,0.8); backdrop-filter: blur(8px);
        padding: 10px 16px;
        display: flex; justify-content: space-between; align-items: center;
        border-bottom: 1px solid var(--border);
      }
      .hud-logo { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--cyan); letter-spacing: 0.16em; }
      #gps-badge {
        display: flex; align-items: center; gap: 7px;
        font-family: 'Share Tech Mono', monospace; font-size: 11px; color: #5ab8c8; letter-spacing: 0.08em;
      }
      .gps-led {
        width: 8px; height: 8px; border-radius: 50%;
        background: var(--red); box-shadow: 0 0 6px var(--red);
        animation: blink 1s step-end infinite; flex-shrink: 0;
      }
      .gps-led.locked { background: var(--green); box-shadow: 0 0 8px var(--green); animation: none; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.1} }

      #coords-bar {
        background: rgba(0,6,12,0.6); padding: 5px 16px;
        font-family: 'Share Tech Mono', monospace; font-size: 10.5px;
        color: #1e5060; letter-spacing: 0.09em;
        border-bottom: 1px solid rgba(0,255,231,0.06);
        transition: color 0.4s;
      }
      #coords-bar.locked { color: #39c090; }

      /* 錨點資訊卡 */
      #obj-card {
        position: fixed; bottom: 88px; left: 14px; right: 14px; z-index: 8888;
        background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
        padding: 12px 16px; display: none; flex-direction: column; gap: 3px;
        backdrop-filter: blur(10px); animation: fadeUp 0.4s ease both;
      }
      #obj-card.active { display: flex; }
      .card-label { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--cyan2); letter-spacing: 0.12em; }
      .card-value { font-size: 13px; font-weight: 400; color: #c8f0f8; }

      /* ════════ 音樂 & 錯誤 ════════ */
      #music-btn {
        position: fixed; bottom: 24px; right: 18px; z-index: 9000;
        width: 50px; height: 50px; border-radius: 50%;
        background: var(--panel); border: 1.5px solid var(--border);
        display: none; align-items: center; justify-content: center;
        cursor: pointer; font-size: 22px;
        backdrop-filter: blur(8px);
        transition: border-color 0.25s, box-shadow 0.25s;
      }
      #music-btn.active { display: flex; }
      #music-btn:hover  { border-color: var(--cyan); box-shadow: 0 0 16px rgba(0,255,231,0.35); }

      #error-toast {
        position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%);
        z-index: 9997;
        background: rgba(160,20,20,0.92); color: #fff;
        padding: 11px 20px; border-radius: 10px;
        font-size: 12px; text-align: center; max-width: 86vw; line-height: 1.55;
        backdrop-filter: blur(6px);
        display: none; animation: fadeUp 0.3s ease both;
      }
    </style>
  </head>

  <body>

    <!-- ══ 1. 啟動畫面 ══ -->
    <div id="splash">
      <div class="splash-inner">
        <div class="radar">
          <div class="radar-ring"></div>
          <div class="radar-ring"></div>
          <div class="radar-ring"></div>
          <div class="radar-sweep"></div>
          <div class="radar-dot"></div>
        </div>

        <div class="splash-title">AR LOCATION</div>
        <p class="splash-sub">以您目前 GPS 位置為錨點<br>在現實空間中呈現 3D 物件</p>

        <div class="perm-list">
          <div class="perm-item">
            <span class="perm-icon">📷</span><span>攝影機權限</span>
            <span class="perm-status">REQUIRED</span>
          </div>
          <div class="perm-item">
            <span class="perm-icon">📍</span><span>精確位置（GPS）</span>
            <span class="perm-status">REQUIRED</span>
          </div>
          <div class="perm-item">
            <span class="perm-icon">🔒</span><span>HTTPS 連線</span>
            <span class="perm-status">REQUIRED</span>
          </div>
        </div>

        <button id="start-btn"><span>▶ &nbsp;LAUNCH AR</span></button>
        <span class="ver">v1.0 · GPS-BASED · NO MARKER</span>
      </div>
    </div>

    <!-- ══ 2. Loading 畫面 ══ -->
    <div id="loading-screen">
      <div class="load-ring"></div>
      <div class="load-steps">
        <div class="load-step" id="step-cam"><span class="step-dot"></span>初始化攝影機…</div>
        <div class="load-step" id="step-music"><span class="step-dot"></span>載入背景音樂…</div>
        <div class="load-step" id="step-gps"><span class="step-dot"></span>等待 GPS 定位…</div>
        <div class="load-step" id="step-obj"><span class="step-dot"></span>錨定 3D 物件…</div>
      </div>
    </div>

    <!-- ══ 3. AR HUD ══ -->
    <div id="hud">
      <div id="status-bar">
        <span class="hud-logo">AR LOCATION</span>
        <span id="gps-badge">
          <span class="gps-led" id="gps-led"></span>
          <span id="gps-text">搜尋中…</span>
        </span>
      </div>
      <div id="coords-bar">LAT ————————&nbsp;&nbsp;LNG ————————</div>
    </div>

    <!-- 錨點資訊卡 -->
    <div id="obj-card">
      <span class="card-label">ANCHOR POINT</span>
      <span class="card-value" id="card-coords">—</span>
      <span class="card-label" style="margin-top:5px">STATUS</span>
      <span class="card-value" id="card-status">定位中…</span>
    </div>

    <!-- 錯誤 -->
    <div id="error-toast"></div>

    <!-- 音樂按鈕 -->
    <div id="music-btn" title="音樂開關">🔊</div>

    <!-- ══ AR 場景 ══ -->
    <a-scene
      id="ar-scene"
      renderer="logarithmicDepthBuffer: true; antialias: true;"
      embedded
      loading-screen="enabled: false;"
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam;
            trackingMethod: best;
            debugUIEnabled: false;
            locationMinimumAccuracy: 50;"
    >
      <a-assets timeout="30000">
        <!-- ✅ 使用上傳的正確檔名 -->
        <a-asset-item id="model-asset" src="asset.glb"></a-asset-item>
      </a-assets>

      <!--
        gps-entity-place：由 JS 在第一次 GPS 定位後動態寫入座標
        visible="false"：定位完成前隱藏，避免物件漂移到 (0,0)
      -->
      <a-entity
        id="ar-object"
        gps-entity-place="latitude: 0; longitude: 0;"
        gltf-model="#model-asset"
        animation-mixer="loop: repeat"
        scale="2 2 2"
        rotation="0 0 0"
        visible="false"
      ></a-entity>

      <a-camera gps-camera rotation-reader look-controls-enabled="false"></a-camera>
    </a-scene>

    <!-- ✅ 音樂：正確檔名 Sandungueo_sin_freno.mp3，與 index.html 同目錄 -->
    <audio id="bg-music" src="Sandungueo_sin_freno.mp3" loop preload="auto"></audio>

    <script>
    (function () {
      const splash     = document.getElementById('splash');
      const loadingSc  = document.getElementById('loading-screen');
      const startBtn   = document.getElementById('start-btn');
      const hud        = document.getElementById('hud');
      const gpsLed     = document.getElementById('gps-led');
      const gpsText    = document.getElementById('gps-text');
      const coordsBar  = document.getElementById('coords-bar');
      const objCard    = document.getElementById('obj-card');
      const cardCoords = document.getElementById('card-coords');
      const cardStatus = document.getElementById('card-status');
      const errorToast = document.getElementById('error-toast');
      const musicBtn   = document.getElementById('music-btn');
      const bgMusic    = document.getElementById('bg-music');
      const arObject   = document.getElementById('ar-object');

      const stepCam   = document.getElementById('step-cam');
      const stepMusic = document.getElementById('step-music');
      const stepGps   = document.getElementById('step-gps');
      const stepObj   = document.getElementById('step-obj');

      let gpsLocked   = false;
      let musicOn     = true;

      function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
      function markActive(el) { el.classList.add('active'); }
      function markDone(el)   { el.classList.remove('active'); el.classList.add('done'); }

      function showError(msg, ms = 7000) {
        errorToast.textContent = msg;
        errorToast.style.display = 'block';
        if (ms) setTimeout(() => { errorToast.style.display = 'none'; }, ms);
      }

      /* ── 音樂切換 ── */
      musicBtn.addEventListener('click', () => {
        musicOn = !musicOn;
        musicOn ? bgMusic.play().catch(() => {}) : bgMusic.pause();
        musicBtn.textContent = musicOn ? '🔊' : '🔇';
      });

      /* ══════════════════════════════
         STEP：按下 LAUNCH AR
      ══════════════════════════════ */
      startBtn.addEventListener('click', async () => {

        // 切換到 loading 畫面
        splash.style.display = 'none';
        loadingSc.classList.add('active');

        // ── STEP 1：攝影機初始化（A-Frame 已在背景啟動）
        markActive(stepCam);
        await delay(700);
        markDone(stepCam);

        // ── STEP 2：播放音樂 Sandungueo_sin_freno.mp3
        markActive(stepMusic);
        try {
          await bgMusic.play();
        } catch (e) {
          console.warn('[Music] 播放失敗:', e);
        }
        await delay(400);
        markDone(stepMusic);

        // ── STEP 3：GPS 定位
        markActive(stepGps);
        if (!navigator.geolocation) {
          showError('⚠️ 此裝置不支援 Geolocation API，無法 GPS 定位。');
          loadingSc.classList.remove('active');
          splash.style.display = 'flex';
          return;
        }

        navigator.geolocation.watchPosition(onGpsOk, onGpsErr, {
          enableHighAccuracy: true,
          maximumAge: 0,
          timeout: 20000
        });
      });

      /* ══════════════════════════════
         GPS 成功：定位並錨定物件
      ══════════════════════════════ */
      function onGpsOk(pos) {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        const acc = Math.round(pos.coords.accuracy);

        // 每次都刷新 HUD 座標
        coordsBar.textContent = `LAT ${lat.toFixed(6)}  |  LNG ${lng.toFixed(6)}  |  ±${acc}m`;
        coordsBar.classList.add('locked');
        gpsLed.classList.add('locked');
        gpsText.textContent = 'GPS LOCKED';

        if (!gpsLocked) {
          /* ── 第一次定位：將 asset.glb 錨定到當前座標 ── */
          gpsLocked = true;

          // 若想讓物件出現在正前方約 2 公尺，可改為：
          //   latitude: ${lat + 0.000018}（約 +2m）
          arObject.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lng};`);
          arObject.setAttribute('visible', 'true');

          markDone(stepGps);

          // ── STEP 4：物件就緒
          markActive(stepObj);
          setTimeout(() => {
            markDone(stepObj);

            // 進入 AR 主畫面
            loadingSc.classList.remove('active');
            hud.classList.add('active');
            musicBtn.classList.add('active');
            objCard.classList.add('active');

            cardCoords.textContent = `${lat.toFixed(6)},  ${lng.toFixed(6)}`;
            cardStatus.textContent = `已錨定 · 精度 ±${acc}m`;
            console.log(`[AR] asset.glb 錨定至 ${lat}, ${lng}，精度 ±${acc}m`);
          }, 900);

        } else {
          /* ── 後續更新：只更新 UI，物件不移動（防漂移）── */
          if (objCard.classList.contains('active')) {
            cardStatus.textContent = `已錨定 · 即時精度 ±${acc}m`;
          }
        }
      }

      /* ══════════════════════════════
         GPS 失敗處理
      ══════════════════════════════ */
      function onGpsErr(err) {
        gpsLed.classList.remove('locked');
        gpsText.textContent = 'GPS ERROR';
        const msgs = {
          1: '⚠️ 位置權限被拒，請至瀏覽器設定中允許位置存取。',
          2: '⚠️ 無法取得位置，請確認裝置 GPS 已開啟。',
          3: '⚠️ GPS 定位逾時，請移至空曠處後重新整理。'
        };
        showError(msgs[err.code] || '⚠️ GPS 發生未知錯誤。');
        if (!gpsLocked) {
          setTimeout(() => {
            loadingSc.classList.remove('active');
            splash.style.display = 'flex';
          }, 3500);
        }
      }
    })();
    </script>
  </body>
</html>
