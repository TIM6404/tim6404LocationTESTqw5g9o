<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Ultimate AR Location Experience</title>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

    <style>
        :root { --cyan: #00ffe7; --dark: #020c14; }
        body { margin: 0; overflow: hidden; background: var(--dark); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        #overlay {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(2, 12, 20, 0.95); color: white; text-align: center;
            backdrop-filter: blur(5px);
        }
        #overlay h2 { margin-bottom: 10px; color: var(--cyan); font-size: 1.8rem; }
        #overlay p { margin-bottom: 30px; font-size: 0.95rem; opacity: 0.8; line-height: 1.6; }
        
        #button-container {
            display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;
        }
        
        #start-btn, #disagree-btn {
            padding: 15px 35px; font-size: 1.1rem; border-radius: 50px;
            cursor: pointer; letter-spacing: 2px; transition: all 0.3s; font-weight: bold;
            border: 2px solid var(--cyan); min-width: 150px;
        }
        
        #start-btn {
            background: rgba(0, 255, 231, 0.1); color: var(--cyan);
        }
        #start-btn:hover { background: rgba(0, 255, 231, 0.2); }
        #start-btn:active { background: var(--cyan); color: var(--dark); }

        #disagree-btn {
            background: rgba(255, 50, 50, 0.1); color: #ff5050;
            border-color: #ff5050;
        }
        #disagree-btn:hover { background: rgba(255, 50, 50, 0.2); }
        #disagree-btn:active { background: #ff5050; color: white; }

        #status-hud {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            background: rgba(0, 0, 0, 0.75); color: var(--cyan); 
            padding: 12px; font-size: 12px; border-radius: 8px; 
            border-left: 3px solid var(--cyan); pointer-events: none;
            line-height: 1.6; font-family: monospace;
        }

        #music-btn {
            position: fixed; bottom: 30px; right: 30px; z-index: 1000;
            background: rgba(0, 255, 231, 0.1); border: 2px solid var(--cyan);
            color: var(--cyan); width: 70px; height: 70px; border-radius: 50%;
            font-size: 1.8rem; cursor: pointer; transition: all 0.3s;
            display: none; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(0, 255, 231, 0.3);
        }
        #music-btn:hover { 
            background: rgba(0, 255, 231, 0.2); 
            transform: scale(1.15);
            box-shadow: 0 0 30px rgba(0, 255, 231, 0.5);
        }
        #music-btn:active { background: var(--cyan); color: var(--dark); }

        #debug-log {
            position: fixed; bottom: 120px; right: 30px; z-index: 999;
            background: rgba(0, 0, 0, 0.75); color: #00ff00;
            padding: 10px; font-size: 11px; border-radius: 5px;
            border: 1px solid #00ff00; max-width: 300px; max-height: 150px;
            overflow-y: auto; display: none; font-family: monospace;
            pointer-events: none; line-height: 1.4;
        }

        #accuracy-indicator {
            position: fixed; top: 15px; right: 15px; z-index: 1000;
            background: rgba(0, 0, 0, 0.75); color: var(--cyan);
            padding: 12px; font-size: 12px; border-radius: 8px;
            border-left: 3px solid var(--cyan); pointer-events: none;
            font-family: monospace; display: none; text-align: right;
        }
    </style>
</head>

<body>
    <div id="status-hud">
        Status: Waiting for confirmation...<br>
        Latitude: ---<br>
        Longitude: ---<br>
        Accuracy: ---
    </div>

    <div id="accuracy-indicator">
        GPS Signal Strength<br>
        <span id="signal-bar">▁▁▁</span>
    </div>

    <div id="overlay">
        <h2>🌍 Location Permission</h2>
        <p>Please allow location access to place virtual objects in the real world.<br>Exclusive audio and 3D animations will play upon entry.</p>
        <div id="button-container">
            <button id="start-btn">✓ Confirm & Start AR</button>
            <button id="disagree-btn">✗ Decline</button>
        </div>
    </div>

    <button id="music-btn">🎵</button>
    <div id="debug-log"></div>

    <a-scene
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">
        
        <a-assets>
            <a-asset-item id="model" src="assets/asset.glb"></a-asset-item>
        </a-assets>

        <a-entity id="ar-model-container"></a-entity>

        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <audio id="bgm" src="assets/Sandungueo_sin_freno.mp3" loop preload="auto"></audio>

    <script>
        // ===== Debug Log Function =====
        const debugLog = document.getElementById('debug-log');
        const logs = [];
        
        function addLog(message) {
            const timestamp = new Date().toLocaleTimeString();
            logs.push(`[${timestamp}] ${message}`);
            if (logs.length > 10) logs.shift();
            debugLog.innerHTML = logs.join('<br>');
        }

        // ===== Core Variables =====
        const startBtn = document.getElementById('start-btn');
        const disagreeBtn = document.getElementById('disagree-btn');
        const overlay = document.getElementById('overlay');
        const hud = document.getElementById('status-hud');
        const bgm = document.getElementById('bgm');
        const container = document.getElementById('ar-model-container');
        const musicBtn = document.getElementById('music-btn');
        const accuracyIndicator = document.getElementById('accuracy-indicator');
        const signalBar = document.getElementById('signal-bar');
        
        let isModelPlaced = false;
        let watchId = null;

        // ===== Disagree Button =====
        disagreeBtn.addEventListener('click', () => {
            alert('You declined AR access. Reload the page to try again.');
            overlay.style.opacity = '0.5';
            startBtn.disabled = true;
            disagreeBtn.disabled = true;
            addLog("User declined location access");
        });

        // ===== Music Button Control =====
        musicBtn.addEventListener('click', () => {
            if (bgm.paused) {
                bgm.play().catch(e => console.log("Music playback blocked", e));
                musicBtn.textContent = '⏸';
                musicBtn.style.boxShadow = '0 0 30px rgba(0, 255, 100, 0.5)';
            } else {
                bgm.pause();
                musicBtn.textContent = '🎵';
                musicBtn.style.boxShadow = '0 0 20px rgba(0, 255, 231, 0.3)';
            }
        });

        // ===== Update Signal Strength =====
        function updateSignalBar(accuracy) {
            let bars = '▁▁▁';
            if (accuracy < 10) bars = '▃▃▃';
            else if (accuracy < 20) bars = '▄▄▄';
            else if (accuracy < 50) bars = '▅▅▅';
            else if (accuracy < 100) bars = '▆▆▆';
            signalBar.textContent = bars;
        }

        // ===== Main Startup Function =====
        startBtn.addEventListener('click', async () => {
            addLog("User clicked Confirm & Start AR");

            // Request sensor permissions (iOS required)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    addLog("Requesting gyroscope permission...");
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState !== 'granted') {
                        alert('Sensor permission is required to experience AR features.');
                        addLog("Gyroscope permission denied");
                        return;
                    }
                    addLog("Gyroscope permission granted");
                } catch (e) {
                    addLog("Gyroscope permission request failed or not supported: " + e.message);
                    console.warn("Sensor permission request failed", e);
                }
            }

            // Hide overlay
            overlay.style.display = 'none';
            musicBtn.style.display = 'flex';
            accuracyIndicator.style.display = 'block';
            addLog("Overlay hidden, music button and accuracy indicator displayed");

            // Play background music
            bgm.play().catch(e => {
                addLog("Music playback blocked by browser: " + e.message);
                console.log("Music playback blocked", e);
            });

            // Update HUD status
            hud.innerHTML = "Status: Searching for GPS signal...<br>Latitude: Loading...<br>Longitude: Loading...<br>Accuracy: Loading...";
            addLog("Starting GPS location retrieval");

            // Check geolocation support
            if ("geolocation" in navigator) {
                // Use watchPosition for continuous tracking
                watchId = navigator.geolocation.watchPosition(
                    (position) => {
                        const latitude = position.coords.latitude;
                        const longitude = position.coords.longitude;
                        const accuracy = position.coords.accuracy;

                        addLog(`GPS Locked - Lat: ${latitude.toFixed(6)}, Lon: ${longitude.toFixed(6)}, Accuracy: ${Math.round(accuracy)}m`);
                        console.log("GPS location obtained:", { latitude, longitude, accuracy });

                        // Update HUD display
                        hud.innerHTML = `Status: GPS Locked (Accuracy: ${Math.round(accuracy)}m)<br>Latitude: ${latitude.toFixed(6)}<br>Longitude: ${longitude.toFixed(6)}<br>Accuracy: ${accuracy.toFixed(1)}m`;

                        // Update signal strength bar
                        updateSignalBar(accuracy);

                        // Place model only once
                        if (!isModelPlaced) {
                            const offsetLat = latitude + 0.000045; // Slight north offset
                            
                            const modelEntity = document.createElement('a-entity');
                            modelEntity.setAttribute('gltf-model', '#model');
                            modelEntity.setAttribute('gps-entity-place', `latitude: ${offsetLat}; longitude: ${longitude};`);
                            modelEntity.setAttribute('scale', '2 2 2');
                            modelEntity.setAttribute('rotation', '0 0 0');
                            modelEntity.setAttribute('animation-mixer', 'loop: repeat');
                            modelEntity.setAttribute('id', 'placed-model');

                            container.appendChild(modelEntity);
                            isModelPlaced = true;

                            addLog("3D model successfully placed at GPS location");
                            console.log("3D model placed");
                        }
                    },
                    (err) => {
                        addLog(`GPS location failed: ${err.message}`);
                        hud.innerHTML = `Status: Location Locating Failed<br>Error: ${err.message}<br>Code: ${err.code}`;
                        console.error("GPS location error:", err);

                        // Specific error messages
                        if (err.code === 1) {
                            alert('Please allow location access permission');
                        } else if (err.code === 2) {
                            alert('Unable to obtain location signal. Please ensure GPS is enabled.');
                        } else if (err.code === 3) {
                            alert('Location request timed out. Please try again.');
                        }
                    },
                    { 
                        enableHighAccuracy: true,      // Use high-accuracy positioning
                        timeout: 30000,                // 30 second timeout
                        maximumAge: 0                  // Don't use cached location
                    }
                );
            } else {
                hud.innerHTML = "Status: Device does not support GPS functionality";
                addLog("Device does not support geolocation");
                alert('Your device does not support GPS functionality');
            }
        });

        // ===== Model Loading Error Check =====
        const sceneEl = document.querySelector('a-scene');
        sceneEl.addEventListener('model-loaded', () => {
            addLog("3D model successfully loaded");
        });
        sceneEl.addEventListener('model-error', (e) => {
            addLog("3D model loading failed: " + e.detail.error);
        });

        // Stop tracking when page unloads
        window.addEventListener('beforeunload', () => {
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
            }
        });

        // Initial log on startup
        addLog("Page loaded, awaiting user interaction");
    </script>
</body>
</html>
